services:

  # ── 1. Redis broker / result backend ────────────────────────────
  # S-09: set REDIS_PASSWORD in the environment (or a .env file) to enable
  # Redis authentication. Without it, Redis runs without a password (dev only).
  redis:
    image: redis:7-alpine
    container_name: xplagiax_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server
        fi
      '
    networks:
      - xplagiax-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Flask / Gunicorn web server ──────────────────────────────
  web:
    build: .
    image: xplagiax_xota
    container_name: xplagiax_web
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      # When REDIS_PASSWORD is set, override REDIS_URL to include the password:
      # REDIS_URL=redis://:yourpassword@redis:6379
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      - xplagiax-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5006/health')"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 3

  # ── 3. Celery worker ────────────────────────────────────────────
  celery_worker:
    image: xplagiax_xota
    container_name: xplagiax_xota_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery worker
      --loglevel=info
      --concurrency=1
      --pool=solo
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      - xplagiax-net
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL",
             "celery -A app.celery_app.celery inspect ping -d celery@$$HOSTNAME --timeout 10 || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 90s
      retries: 3

networks:
  xplagiax-net:
    driver: bridge
