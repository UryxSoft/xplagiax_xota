services:

  # ── 1. Redis broker / result backend ────────────────────────────
  # S-09: set REDIS_PASSWORD in the environment (or a .env file) to enable
  # Redis authentication. Without it, Redis runs without a password (dev only).
  redis:
    image: redis:7-alpine
    container_name: xplagiax_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server
        fi
      '
    networks:
      - xplagiax-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Flask / Gunicorn web server ──────────────────────────────
  # GUNICORN_SPAWN_CELERY=1 forks the Celery worker from the gunicorn
  # master AFTER preload_app, so the worker inherits the 1.7 GB of model
  # weights via Linux CoW — no second copy in RAM.
  # The separate celery_worker service below is disabled by default
  # (profiles: ["external-celery"]) to avoid duplicate workers + double RAM.
  web:
    build: .
    image: xplagiax_xota
    container_name: xplagiax_web
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # S-09: must match the password set on the redis service so the URL can
      # authenticate (config.py injects it into REDIS_URL automatically).
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Fork Celery from gunicorn master (CoW — no model duplication)
      GUNICORN_SPAWN_CELERY: "1"
    networks:
      # Fix #1: expose the canonical hostname `xplagiax-xota` so other compose
      # projects (marktrack) can reach this service. The Compose service is
      # named `web`, so without this alias `http://xplagiax-xota:5006` does not
      # resolve from another project's containers.
      xplagiax-net:
        aliases:
          - xplagiax-xota
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: ${WEB_MEM_LIMIT:-4g}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5006/health')"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 3

  # ── 3. Celery worker (external — disabled by default) ───────────
  # Only activate this if you explicitly need a separate Celery container
  # (e.g. for scaling workers independently). When active, disable
  # GUNICORN_SPAWN_CELERY in the web service to avoid duplicate workers.
  # WARNING: a separate container does NOT share CoW memory with gunicorn —
  # the models are loaded a second time, adding ~1.7 GB of RAM.
  #
  # To enable: docker compose --profile external-celery up
  celery_worker:
    image: xplagiax_xota
    container_name: xplagiax_xota_worker
    profiles: ["external-celery"]
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery worker
      --loglevel=info
      --concurrency=1
      --pool=solo
      --max-tasks-per-child=50
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      - xplagiax-net
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    mem_limit: ${CELERY_MEM_LIMIT:-3g}
    healthcheck:
      test: ["CMD-SHELL",
             "celery -A app.celery_app.celery inspect ping -d celery@$$HOSTNAME --timeout 10 || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 90s
      retries: 3

networks:
  # Fix #1: pin the literal network name so Compose does NOT prefix it with the
  # project name (it would become `xplagiax_xota_xplagiax-net` otherwise).
  # marktrack joins this same network as `external: true, name: xplagiax-net`.
  # Bring xota up first (it creates the network) or pre-create it once with:
  #   docker network create xplagiax-net
  xplagiax-net:
    name: xplagiax-net
    driver: bridge
