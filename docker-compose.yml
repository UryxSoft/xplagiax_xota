services:

  # ── 1. Redis broker / result backend ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xplagiax_redis
    restart: unless-stopped
    networks:
      - xplagiax-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Flask / Gunicorn web server ──────────────────────────────
  web:
    build: .
    image: xplagiax_xota
    container_name: xplagiax_web
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      REDIS_URL: "redis://redis:6379"
    networks:
      - xplagiax-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5006/health')"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 3

  # ── 3. Celery worker ────────────────────────────────────────────
  celery_worker:
    image: xplagiax_xota
    container_name: xplagiax_celery_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery worker
      --loglevel=info
      --concurrency=1
      --pool=solo
    environment:
      REDIS_URL: "redis://redis:6379"
    networks:
      - xplagiax-net
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

networks:
  xplagiax-net:
    driver: bridge
